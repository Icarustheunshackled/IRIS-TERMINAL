<!DOCTYPE html>
<html>
<head>
    <title>[CRITICAL ERROR]</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; margin: 0; cursor: pointer; }
        .glitch { font-size: 20px; animation: flash 0.1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="glitch">
        <h1>[SYSTEM INTEGRITY COMPROMISED]</h1>
        <p>USER ACCESS REVOKED PERMANENTLY</p>
        <p style="color: #444; font-size: 10px;">Click to acknowledge terminal status</p>
    </div>

    <script src="bypass.js"></script>

    <script>
        const alarm = new Audio('siren.mp3');
        alarm.loop = true;
        document.addEventListener('click', () => alarm.play(), {once: true});
    </script>
</body>
</html>
